<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Transportation Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="form-box">
        <h1>Accessible Transportation System</h1>
        <h2>User Login</h2>

        <form>

            <label for="email">Email Address</label>
            <input 
                type="email" 
                id="email" 
                placeholder="Enter your email"
                aria-label="Email Address"
                required
            >

            <label for="password">Password</label>
            <input 
                type="password" 
                id="password"
                placeholder="Enter your password"
                aria-label="Password"
                required
            >

            <button type="submit">
                Login
            </button>

            <p>
                Don't have an account?
                <a href="register.html">Register Here</a>
            </p>

        </form>

    </div>

</div>

</body>
</html>
