<!-- Responsive Navigation Bar -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Navigation Bar</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f7fc;
        }

        /* Navigation Bar */

        nav{
            background:#003366;
            padding:15px 25px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            position:relative;
        }

        /* Logo */

        .logo{
            color:white;
            font-size:24px;
            font-weight:bold;
        }

        /* Navigation Links */

        .nav-links{
            display:flex;
            list-style:none;
            gap:20px;
        }

        .nav-links li a{
            color:white;
            text-decoration:none;
            font-size:18px;
            padding:10px 15px;
            border-radius:6px;
            transition:0.3s;
        }

        .nav-links li a:hover,
        .nav-links li a:focus{
            background:#0055aa;
            outline:3px solid #ffcc00;
        }

        /* Login Button */

        .login-btn{
            background:#0066cc;
            padding:10px 18px;
            border-radius:6px;
        }

        .login-btn:hover{
            background:#004999;
        }

        /* Hamburger Menu */

        .menu-toggle{
            display:none;
            flex-direction:column;
            cursor:pointer;
        }

        .menu-toggle span{
            height:4px;
            width:28px;
            background:white;
            margin:4px 0;
            border-radius:5px;
        }

        /* Responsive Design */

        @media(max-width:768px){

            .menu-toggle{
                display:flex;
            }

            .nav-links{
                display:none;
                flex-direction:column;
                width:100%;
                background:#003366;
                position:absolute;
                top:70px;
                left:0;
                padding:20px 0;
            }

            .nav-links.active{
                display:flex;
            }

            .nav-links li{
                text-align:center;
                margin:10px 0;
            }

        }

        /* Accessibility */

        a:focus,
        button:focus{
            outline:3px solid #ffcc00;
        }

    </style>

</head>
<body>

    <!-- Navigation Bar -->

    <nav>

        <!-- Logo -->

        <div class="logo">
            ATS-PWD
        </div>

        <!-- Hamburger Menu -->

        <div 
            class="menu-toggle" 
            id="menu-toggle"
            aria-label="Toggle Navigation Menu"
            tabindex="0"
        >

            <span></span>
            <span></span>
            <span></span>

        </div>

        <!-- Navigation Links -->

        <ul class="nav-links" id="nav-links">

            <li>
                <a href="index.html">Home</a>
            </li>

            <li>
                <a href="dashboard.html">Dashboard</a>
            </li>

            <li>
                <a href="booking.html">Book Ride</a>
            </li>

            <li>
                <a href="admin.html">Admin</a>
            </li>

            <li>
                <a href="contact.html">Contact</a>
            </li>

            <li>
                <a href="login.html" class="login-btn">
                    Login
                </a>
            </li>

        </ul>

    </nav>

    <!-- JavaScript -->

    <script>

        const menuToggle = document.getElementById("menu-toggle");
        const navLinks = document.getElementById("nav-links");

        menuToggle.addEventListener("click", () => {
            navLinks.classList.toggle("active");
        });

        // Keyboard accessibility

        menuToggle.addEventListener("keypress", (e) => {

            if(e.key === "Enter"){
                navLinks.classList.toggle("active");
            }

        });

    </script>

</body>
</html>
